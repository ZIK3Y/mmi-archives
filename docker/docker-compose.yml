services:

  # ── Base de données MySQL ──────────────────────────────────────────────────
  db:
    image: mysql:8.0
    container_name: mmi-archive-db
    restart: always
    environment:
      MYSQL_DATABASE: mmi-archive
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: mmi_user
      MYSQL_PASSWORD: mmi_password
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── API Spring Boot ────────────────────────────────────────────────────────
  api:
    build:
      context: ../api
      dockerfile: ../docker/Dockerfile
    container_name: mmi-archive-api
    restart: always
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/mmi-archive?createDatabaseIfNotExist=true
      SPRING_DATASOURCE_USERNAME: mmi_user
      SPRING_DATASOURCE_PASSWORD: mmi_password
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
    depends_on:
      db:
        condition: service_healthy

volumes:
  mysql_data:
